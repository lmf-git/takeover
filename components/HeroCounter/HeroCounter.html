<style>
  :host { display: block; }
  *, *::before, *::after { box-sizing: border-box; }

  .panel {
    border-radius: var(--radius-lg, 10px);
    border: 1px solid var(--line);
    background: var(--bg-elev);
    overflow: hidden;
    box-shadow: 0 24px 60px -20px oklch(0 0 0 / 0.5), 0 1px 0 oklch(1 0 0 / 0.04) inset;
  }

  .chrome {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    border-bottom: 1px solid var(--line-soft);
    background: var(--bg-elev-2);
  }

  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .dot-r { background: oklch(0.55 0.16 28); }
  .dot-y { background: oklch(0.78 0.14 85); }
  .dot-g { background: oklch(0.72 0.16 145); }

  .url-bar {
    margin-left: 12px;
    flex: 1;
    padding: 4px 10px;
    background: var(--bg);
    border-radius: 4px;
    border: 1px solid var(--line-soft);
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-muted);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .live-dot { color: var(--accent); }

  .hmr-label { font-family: var(--font-mono); font-size: 10px; color: var(--fg-dim); }

  .body { padding: 28px; display: flex; flex-direction: column; gap: 20px; }

  .counter-card {
    padding: 22px;
    border: 1px solid var(--line-soft);
    border-radius: var(--radius, 6px);
    background: var(--bg);
  }

  .card-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 4px;
    gap: 12px;
  }

  .card-tag {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-muted);
    letter-spacing: 0.06em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .card-shadow { font-family: var(--font-mono); font-size: 10px; color: var(--fg-dim); white-space: nowrap; }

  .card-sub { font-size: 13px; color: var(--fg-muted); margin-bottom: 16px; }

  .counter-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .counter-btn {
    width: 40px;
    height: 40px;
    border-radius: 4px;
    border: 1px solid var(--line);
    background: var(--bg-elev);
    color: var(--fg);
    font-size: 18px;
    font-family: var(--font-mono);
    cursor: pointer;
    transition: all 160ms ease;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .counter-btn:hover { border-color: var(--accent-line); color: var(--accent); }
  .counter-btn:active { transform: scale(0.96); }

  .counter-display {
    flex: 1;
    font-family: var(--font-mono);
    font-size: 36px;
    font-weight: 500;
    text-align: center;
    color: var(--fg);
    font-variant-numeric: tabular-nums;
    background: var(--accent-dim);
    border-radius: 4px;
    padding: 8px 12px;
    border: 1px solid var(--accent-line);
  }

  .counter-footer {
    display: flex;
    justify-content: space-between;
    margin-top: 12px;
    align-items: center;
    gap: 12px;
  }
  .counter-expr {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--fg-dim);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
  }
  .reset-btn {
    border: 0;
    background: transparent;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.06em;
    color: var(--fg-muted);
    text-transform: uppercase;
    padding: 2px 6px;
    flex-shrink: 0;
  }

  .store-viewer {
    padding: 14px;
    border: 1px solid var(--line-soft);
    border-radius: var(--radius, 6px);
    background: var(--bg);
    font-family: var(--font-mono);
    font-size: 11px;
    line-height: 1.7;
    color: var(--fg-muted);
  }

  .store-header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
  }
  .store-key { color: var(--fg-dim); letter-spacing: 0.08em; }
  .store-live { color: var(--accent); }
  .val-purple { color: var(--lavender); }
  .val-blue { color: var(--sky); }
</style>

<div class="panel">
  <div class="chrome">
    <span class="dot dot-r"></span>
    <span class="dot dot-y"></span>
    <span class="dot dot-g"></span>
    <div class="url-bar">
      <span class="live-dot">●</span>
      localhost:3000<span id="locale-path"></span>
    </div>
    <span class="hmr-label">HMR</span>
  </div>

  <div class="body">
    <div class="counter-card">
      <div class="card-header">
        <span class="card-tag">&lt;app-counter /&gt;</span>
        <span class="card-shadow">shadow-dom</span>
      </div>
      <div class="card-sub" id="counter-sub">{{t.counter.sub}}</div>
      <div class="counter-row">
        <button class="counter-btn" id="btn-dec">−</button>
        <div class="counter-display" id="counter-val">00</div>
        <button class="counter-btn" id="btn-inc">+</button>
      </div>
      <div class="counter-footer">
        <span class="counter-expr">store.update('counter', n =&gt; n + 1)</span>
        <button class="reset-btn" id="btn-reset">{{t.counter.reset}}</button>
      </div>
    </div>

    <div class="store-viewer">
      <div class="store-header">
        <span class="store-key">STORE</span>
        <span class="store-live">● live</span>
      </div>
      <div><span class="store-key">theme:</span> '<span class="val-purple" id="sv-theme">dark</span>'</div>
      <div><span class="store-key">locale:</span> '<span class="val-purple" id="sv-locale">en</span>'</div>
      <div><span class="store-key">counter:</span> <span class="val-blue" id="sv-count">0</span></div>
      <div class="store-key" id="sv-label">// reactive store</div>
    </div>
  </div>
</div>
