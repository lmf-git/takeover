<style>
  nav {
    background-color: var(--primary-color, #264653);
    padding: 15px 0;
    margin-bottom: 20px;
    transition: var(--transition);
  }
  
  .nav-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  
  ul {
    display: flex;
    list-style: none;
    margin: 0;
    padding: 0;
  }
  
  li {
    margin: 0 15px;
  }
  
  a {
    color: white;
    text-decoration: none;
    font-weight: bold;
    font-size: 18px;
    transition: var(--transition);
  }
  
  a:hover {
    color: var(--warning-color, #e9c46a);
  }
  
  .nav-actions {
    display: flex;
    align-items: center;
    gap: 15px;
  }
  
  .user-info {
    color: white;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 14px;
  }
  
  .user-avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    border: 2px solid white;
  }
  
  .auth-btn {
    background: var(--success-color, #198754);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 4px;
    cursor: pointer;
    font-weight: bold;
    transition: var(--transition);
  }
  
  .auth-btn:hover {
    background: var(--primary-hover, #0b5ed7);
  }
  
  .auth-btn.logout {
    background: var(--danger-color, #dc3545);
  }
</style>

<nav>
  <div class="nav-container">
    <app-logo></app-logo>
    <ul>
      <li><a href="/" route>{{t.nav.home}}</a></li>
      <li><a href="/about" route>{{t.nav.about}}</a></li>
      <li><a href="/contact" route>{{t.nav.contact}}</a></li>
      <li><a href="/dashboard" route>{{t.nav.dashboard}}</a></li>
    </ul>

    <div class="nav-actions">
      <language-switch></language-switch>
      <theme-toggle></theme-toggle>

      <div id="auth-section">
        {{#if isAuthenticated}}
        <div class="user-info">
          <img class="user-avatar" src="{{user.avatar}}" alt="{{user.username}}">
          <span>{{user.username}}</span>
        </div>
        {{/if}}
        <button class="auth-btn{{#if isAuthenticated}} logout{{/if}}" id="auth-btn">
          {{#if isAuthenticated}}{{t.auth.logout}}{{else}}{{t.auth.login}}{{/if}}
        </button>
      </div>
    </div>
  </div>
</nav>
