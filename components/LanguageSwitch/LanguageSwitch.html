<style>
  :host { display: inline-block; }

  .lang-toggle {
    display: flex;
    border: 1px solid rgba(156,192,204,0.3);
    border-radius: 4px;
    overflow: hidden;
  }

  button {
    background: none;
    border: none;
    color: rgba(247,248,249,0.6);
    font-family: var(--font-sans, inherit);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 5px 10px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }

  button.active {
    background: var(--teal, #9CC0CC);
    color: var(--navy, #0a1825);
  }

  button:not(.active):hover { color: var(--teal, #9CC0CC); }
</style>

<div class="lang-toggle">
  <button class="{{locale === 'es' ? 'active' : ''}}" @click="switchEs">ES</button>
  <button class="{{locale === 'en' ? 'active' : ''}}" @click="switchEn">EN</button>
</div>
