[build]
  command = "yarn build"
  publish = "dist/client"
  functions = "deploy/netlify/functions"

[functions]
  node_bundler = "esbuild"
  included_files = ["dist/server/**/*", "dist/client/_template.html"]

# Hashed assets are content-addressed — safe to cache forever
[[headers]]
  for = "/_assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Lazy-loaded route/component modules are content-hashed by build.js
# (e.g. HomeAbout.<hash>.js) and resolved at runtime via window.__M__,
# so a content change emits a different filename. Safe to cache forever.
[[headers]]
  for = "/app/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/components/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Serve static assets directly (not through SSR)
[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/core/*"
  to = "/core/:splat"
  status = 200

[[redirects]]
  from = "/lib/*"
  to = "/lib/:splat"
  status = 200

[[redirects]]
  from = "/components/*"
  to = "/components/:splat"
  status = 200

[[redirects]]
  from = "/app/*"
  to = "/app/:splat"
  status = 200

[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200

[[redirects]]
  from = "/locales/*"
  to = "/locales/:splat"
  status = 200

# All other routes go to SSR function
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/ssr"
  status = 200
