<style>
  :host { display: block; }

  /* ── Page hero ── */
  .page-hero {
    position: relative;
    min-height: 360px;
    display: flex;
    align-items: flex-end;
    overflow: hidden;
    margin-top: -72px;
    padding-bottom: 64px;
  }

  .hero-inner {
    position: relative;
    z-index: 2;
    padding: 0 56px;
  }

  .page-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: var(--teal, #9CC0CC);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .page-eyebrow::before {
    content: '';
    display: block;
    width: 28px; height: 1px;
    background: var(--teal, #9CC0CC);
  }

  .page-title {
    font-family: var(--font-serif, Georgia, serif);
    font-size: clamp(40px, 5vw, 68px);
    font-weight: 400;
    line-height: 1.06;
    color: #fff;
  }
  .page-title em { font-style: italic; color: var(--teal-light, #c8dde4); }

  /* ── Contact section ── */
  .contact-section {
    background: var(--white, #f7f8f9);
    padding: 80px 0 100px;
  }

  .section-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 56px;
  }

  .contact-grid {
    display: grid;
    grid-template-columns: 1fr 1.5fr;
    gap: 80px;
    align-items: start;
  }

  /* ── Info column ── */
  .section-label {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: var(--blue, #2B789D);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .section-label::before {
    content: '';
    display: block;
    width: 28px; height: 1px;
    background: var(--blue, #2B789D);
  }

  .contact-title {
    font-family: var(--font-serif, Georgia, serif);
    font-size: clamp(28px, 3vw, 44px);
    font-weight: 400;
    line-height: 1.12;
    color: var(--text-dark, #111820);
    margin-bottom: 20px;
  }
  .contact-title em { font-style: italic; color: var(--blue, #2B789D); }

  .contact-sub {
    font-size: 15px;
    line-height: 1.75;
    color: var(--text-mid, #3d5162);
    margin-bottom: 40px;
  }

  .contact-details {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .detail-item {
    display: flex;
    gap: 14px;
    align-items: flex-start;
  }

  .detail-icon {
    width: 32px; height: 32px;
    border: 1px solid rgba(43,120,157,0.2);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--blue, #2B789D);
    flex-shrink: 0;
    margin-top: 2px;
  }

  .detail-label {
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-light, #7a95a8);
    margin-bottom: 3px;
  }

  .detail-value {
    font-size: 14px;
    color: var(--text-dark, #111820);
    font-weight: 500;
  }

  /* ── Form ── */
  .contact-form {
    background: #fff;
    border: 1px solid rgba(43,120,157,0.1);
    border-radius: 2px;
    padding: 40px;
  }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }

  .form-field {
    display: flex;
    flex-direction: column;
    gap: 6px;
    margin-bottom: 16px;
  }

  .form-field label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-mid, #3d5162);
  }

  .form-field input,
  .form-field textarea {
    background: var(--white, #f7f8f9);
    border: 1px solid rgba(43,120,157,0.15);
    border-radius: 2px;
    padding: 11px 14px;
    font-family: var(--font-sans, inherit);
    font-size: 14px;
    color: var(--text-dark, #111820);
    outline: none;
    transition: border-color 0.2s;
    width: 100%;
  }

  .form-field input:focus,
  .form-field textarea:focus {
    border-color: var(--blue, #2B789D);
  }

  .form-field textarea {
    resize: vertical;
    min-height: 120px;
  }

  .submit-btn {
    width: 100%;
    background: var(--blue, #2B789D);
    color: #fff;
    border: none;
    padding: 13px 24px;
    border-radius: 2px;
    font-family: var(--font-sans, inherit);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }
  .submit-btn:hover { background: var(--blue-dark, #1d5a7a); }
  .submit-btn:disabled { opacity: 0.6; cursor: not-allowed; }

  .form-success {
    display: none;
    text-align: center;
    padding: 20px;
    color: var(--blue, #2B789D);
    font-weight: 600;
    font-size: 14px;
  }

  /* ── Fade ── */
  .fade-up {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }
  .fade-up.visible { opacity: 1; transform: translateY(0); }

  /* ── Responsive ── */
  @media (max-width: 900px) {
    .hero-inner { padding: 0 24px; }
    .section-inner { padding: 0 24px; }
    .contact-grid { grid-template-columns: 1fr; gap: 48px; }
    .form-row { grid-template-columns: 1fr; }
  }

  @media (max-width: 600px) {
    .hero-inner { padding: 0 20px; }
    .section-inner { padding: 0 20px; }
    .page-title { font-size: clamp(32px, 9vw, 48px); }
    .contact-form { padding: 24px 20px; }
  }
</style>

<!-- Page hero -->
<div class="page-hero">
  <hero-grid></hero-grid>
  <div class="hero-inner">
    <div class="page-eyebrow">{{t.nav.contact}}</div>
    <h1 class="page-title">{{{t.contact.title}}}</h1>
  </div>
</div>

<!-- Contact -->
<div class="contact-section">
  <div class="section-inner">
    <div class="contact-grid">
      <!-- Info -->
      <div class="fade-up">
        <span class="section-label">{{t.contact.label}}</span>
        <h2 class="contact-title">{{{t.contact.title}}}</h2>
        <p class="contact-sub">{{t.contact.sub}}</p>
        <div class="contact-details">
          <div class="detail-item">
            <div class="detail-icon">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M1 3.5A1.5 1.5 0 0 1 2.5 2h9A1.5 1.5 0 0 1 13 3.5v7A1.5 1.5 0 0 1 11.5 12h-9A1.5 1.5 0 0 1 1 10.5v-7Z" stroke="currentColor" stroke-width="1.2"/><path d="M1 4l6 4 6-4" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/></svg>
            </div>
            <div>
              <div class="detail-label">{{t.contact.emailLabel}}</div>
              <div class="detail-value">info@estremar.com.ar</div>
            </div>
          </div>
          <div class="detail-item">
            <div class="detail-icon">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M3 1h2.5l1 3-1.5 1a8 8 0 0 0 4 4l1-1.5 3 1V11a2 2 0 0 1-2 2A10 10 0 0 1 1 3a2 2 0 0 1 2-2Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/></svg>
            </div>
            <div>
              <div class="detail-label">{{t.contact.phoneLabel}}</div>
              <div class="detail-value">+54 2901 000 000</div>
            </div>
          </div>
          <div class="detail-item">
            <div class="detail-icon">
              <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1a4 4 0 0 1 4 4c0 3-4 8-4 8S3 8 3 5a4 4 0 0 1 4-4Z" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/><circle cx="7" cy="5" r="1.25" stroke="currentColor" stroke-width="1.2"/></svg>
            </div>
            <div>
              <div class="detail-label">{{t.contact.addressLabel}}</div>
              <div class="detail-value">{{t.contact.address}}</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Form -->
      <div class="fade-up" style="transition-delay:0.15s">
        <form class="contact-form" id="contact-form" novalidate>
          <div class="form-row">
            <div class="form-field">
              <label for="f-name">{{t.contact.fName}}</label>
              <input type="text" id="f-name" name="name" autocomplete="name">
            </div>
            <div class="form-field">
              <label for="f-company">{{t.contact.fCompany}}</label>
              <input type="text" id="f-company" name="company" autocomplete="organization">
            </div>
          </div>
          <div class="form-field">
            <label for="f-country">{{t.contact.fCountry}}</label>
            <input type="text" id="f-country" name="country" autocomplete="country-name">
          </div>
          <div class="form-field">
            <label for="f-message">{{t.contact.fMessage}}</label>
            <textarea id="f-message" name="message"></textarea>
          </div>
          <button type="submit" class="submit-btn" id="submit-btn">{{t.contact.fSubmit}}</button>
          <div class="form-success" id="form-success">{{t.contact.fSuccess}}</div>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
import { Component, define } from '/core/component.js';

export default class ContactPage extends Component {
  static templateUrl = '/app/Contact/Contact.html';
  static metadata = { title: 'Contact – Estremar', description: 'Get in touch with Estremar for inquiries about our seafood products, certifications, and sales terms.' };

  mount() {
    this._observer = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
    }, { threshold: 0.12 });
    this.$$('.fade-up').forEach(el => this._observer.observe(el));
  }

  bind() {
    if (this._observer) this.$$('.fade-up').forEach(el => this._observer.observe(el));

    this.on('#contact-form', 'submit', async e => {
      e.preventDefault();
      const btn = this.$('#submit-btn');
      if (btn) btn.disabled = true;

      await new Promise(r => setTimeout(r, 800));

      const form = this.$('#contact-form');
      const success = this.$('#form-success');
      if (form) form.style.display = 'none';
      if (success) success.style.display = 'block';
    });
  }
}

define('contact-page', ContactPage);
</script>
