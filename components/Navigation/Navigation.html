<style>
  :host { display: block; }

  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 56px;
    height: 72px;
    background: rgba(10,24,37,0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(156,192,204,0.12);
    transition: background 0.3s;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    flex-shrink: 0;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 36px;
    list-style: none;
  }

  .nav-links a {
    color: rgba(247,248,249,0.75);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: color 0.2s;
    cursor: pointer;
    background: none;
    border: none;
    font-family: var(--font-sans, inherit);
    padding: 0;
  }

  .nav-links a:hover { color: var(--teal, #9CC0CC); }

  .nav-right {
    display: flex;
    align-items: center;
    gap: 20px;
    flex-shrink: 0;
  }

  .nav-cta {
    background: var(--blue, #2B789D);
    color: #fff;
    border: none;
    padding: 9px 22px;
    border-radius: 4px;
    font-family: var(--font-sans, inherit);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }

  .nav-cta:hover { background: var(--blue-dark, #1d5a7a); }

  app-menu-toggle { display: none; }

  @media (max-width: 900px) {
    nav { padding: 0 20px; }
    .nav-links { display: none; }
    .nav-cta { display: none; }
    language-switch { display: none; }
    app-menu-toggle { display: flex; }
  }
</style>

<nav id="main-nav">
  <a href="/" class="nav-logo" route aria-label="Estremar">
    <app-logo animated></app-logo>
  </a>

  <ul class="nav-links">
    <li><a href="/about" route>{{t.nav.about}}</a></li>
    <li><a href="/fleet" route>{{t.nav.fleet}}</a></li>
    <li><a href="/products" route>{{t.nav.products}}</a></li>
    <li><a href="/sustainability" route>{{t.nav.sustainability}}</a></li>
    <li><a href="/contact" route>{{t.nav.contact}}</a></li>
  </ul>

  <div class="nav-right">
    <language-switch></language-switch>
    <button class="nav-cta" id="contact-cta">{{t.nav.contactUs}}</button>
    <app-menu-toggle></app-menu-toggle>
  </div>
</nav>

<mobile-menu></mobile-menu>
