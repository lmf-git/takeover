<style>
  :host { display: block; }

  .overlay {
    position: fixed;
    inset: 0;
    z-index: 198;
    background: rgba(5,15,25,0.7);
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.3s, visibility 0.3s;
  }

  :host([open]) .overlay {
    opacity: 1;
    visibility: visible;
  }

  .drawer {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: min(320px, 88vw);
    background: #091521;
    border-left: 1px solid rgba(156,192,204,0.12);
    transform: translateX(100%);
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 199;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
    overscroll-behavior: contain;
  }

  :host([open]) .drawer {
    transform: translateX(0);
  }

  .drawer-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 20px;
    border-bottom: 1px solid rgba(156,192,204,0.1);
    flex-shrink: 0;
  }

  .close-btn {
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    color: rgba(247,248,249,0.6);
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 4px;
    transition: color 0.2s, background 0.2s;
  }

  .close-btn:hover {
    color: #fff;
    background: rgba(156,192,204,0.08);
  }

  .drawer-nav {
    display: flex;
    flex-direction: column;
    flex: 1;
    padding: 8px 0;
  }

  .drawer-nav a {
    display: block;
    padding: 15px 24px;
    color: rgba(247,248,249,0.7);
    text-decoration: none;
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    border-bottom: 1px solid rgba(156,192,204,0.07);
    cursor: pointer;
    transition: color 0.2s, background 0.2s, padding-left 0.2s;
  }

  .drawer-nav a:hover {
    color: var(--teal, #9CC0CC);
    background: rgba(156,192,204,0.04);
    padding-left: 28px;
  }

  .drawer-footer {
    padding: 20px 24px 32px;
    border-top: 1px solid rgba(156,192,204,0.1);
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .cta-btn {
    width: 100%;
    background: var(--blue, #2B789D);
    color: #fff;
    border: none;
    padding: 13px 22px;
    border-radius: 4px;
    font-family: var(--font-sans, inherit);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }

  .cta-btn:hover { background: var(--blue-dark, #1d5a7a); }
</style>

<div class="overlay" id="overlay"></div>
<div class="drawer">
  <div class="drawer-header">
    <app-logo></app-logo>
    <button class="close-btn" id="close-btn" aria-label="Close menu">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
        <path d="M3 3l12 12M15 3L3 15" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </button>
  </div>
  <nav class="drawer-nav">
    <a href="/about" route>{{t.nav.about}}</a>
    <a href="/fleet" route>{{t.nav.fleet}}</a>
    <a href="/products" route>{{t.nav.products}}</a>
    <a href="/sustainability" route>{{t.nav.sustainability}}</a>
    <a href="/contact" route>{{t.nav.contact}}</a>
  </nav>
  <div class="drawer-footer">
    <button class="cta-btn" id="cta-btn">{{t.nav.contactUs}}</button>
    <language-switch></language-switch>
  </div>
</div>
