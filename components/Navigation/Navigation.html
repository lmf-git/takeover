<style>
  nav {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 56px;
    height: 72px;
    background: rgba(10, 24, 37, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid rgba(156, 192, 204, 0.12);
    transition: background 0.3s;
  }

  .nav-logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
    color: var(--teal);
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 36px;
    list-style: none;
  }

  .nav-links a {
    color: rgba(247,248,249,0.75);
    text-decoration: none;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    transition: color 0.2s;
  }
  .nav-links a:hover { color: var(--teal); }

  .nav-right { display: flex; align-items: center; gap: 20px; }

  .lang-toggle {
    display: flex;
    border: 1px solid rgba(156,192,204,0.3);
    border-radius: 4px;
    overflow: hidden;
  }
  .lang-toggle button {
    background: none;
    border: none;
    color: rgba(247,248,249,0.6);
    font-family: var(--font-sans);
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    padding: 5px 10px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .lang-toggle button.active {
    background: var(--teal);
    color: var(--navy);
  }
  .lang-toggle button:not(.active):hover { color: var(--teal); }

  .nav-cta {
    background: var(--blue);
    color: #fff;
    border: none;
    padding: 9px 22px;
    border-radius: 4px;
    font-family: var(--font-sans);
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.2s;
  }
  .nav-cta:hover { background: var(--blue-dark); }
</style>

<nav>
  <div class="nav-container">
    <app-logo></app-logo>
    <ul>
      <li><a href="/" route>{{t.nav.home}}</a></li>
      <li><a href="/about" route>{{t.nav.about}}</a></li>
      <li><a href="/contact" route>{{t.nav.contact}}</a></li>
      <li><a href="/dashboard" route>{{t.nav.dashboard}}</a></li>
    </ul>

    <div class="nav-actions">
      <language-switch></language-switch>
      <theme-toggle></theme-toggle>

      <div id="auth-section">
        {{#if isAuthenticated}}
        <div class="user-info">
          <img class="user-avatar" src="{{user.avatar}}" alt="{{user.username}}">
          <span>{{user.username}}</span>
        </div>
        {{/if}}
        <button class="auth-btn{{#if isAuthenticated}} logout{{/if}}" id="auth-btn">
          {{#if isAuthenticated}}{{t.auth.logout}}{{else}}{{t.auth.login}}{{/if}}
        </button>
      </div>
    </div>
    <button class="nav-cta">
      {{lang === 'es' ? 'Ventas' : 'Sales'}}
    </button>
  </div>
</nav>
