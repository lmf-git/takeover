<style>
  :host { display: flex; align-items: center; }

  button {
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px;
    display: flex;
    flex-direction: column;
    gap: 5px;
    align-items: center;
    justify-content: center;
    width: 36px;
    height: 36px;
    border-radius: 4px;
    transition: background 0.2s;
  }

  button:hover { background: rgba(156,192,204,0.08); }

  .bar {
    display: block;
    width: 20px;
    height: 2px;
    background: rgba(247,248,249,0.75);
    border-radius: 2px;
    transition: transform 0.25s ease, opacity 0.25s ease, width 0.25s ease;
    transform-origin: center;
  }

  :host([open]) .bar-1 { transform: translateY(7px) rotate(45deg); }
  :host([open]) .bar-2 { opacity: 0; width: 0; }
  :host([open]) .bar-3 { transform: translateY(-7px) rotate(-45deg); }
</style>

<button id="toggle-btn" aria-label="Menu" aria-expanded="false">
  <span class="bar bar-1"></span>
  <span class="bar bar-2"></span>
  <span class="bar bar-3"></span>
</button>
