<style>
  :host { display: block; }
  *, *::before, *::after { box-sizing: border-box; }

  .hero {
    padding-top: clamp(72px, 10vw, 140px);
    padding-bottom: clamp(72px, 10vw, 140px);
    position: relative;
    background: var(--bg);
  }

  .shell {
    max-width: var(--shell-max, 1240px);
    margin: 0 auto;
    padding: 0 var(--gutter, clamp(20px,4vw,48px));
  }

  .hero-grid {
    display: grid;
    grid-template-columns: minmax(0, 1.15fr) minmax(0, 1fr);
    gap: clamp(32px, 5vw, 80px);
    align-items: center;
  }

  /* Badge */
  .hero-badge-row {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 28px;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 5px 10px;
    border-radius: 3px;
    background: var(--accent-dim);
    color: var(--accent-soft);
    font-family: var(--font-mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.04em;
    border: 1px solid var(--accent-line);
  }

  .badge-dot {
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: var(--accent-soft);
    box-shadow: 0 0 8px var(--accent-soft);
  }

  /* Headline */
  h1 {
    font-size: clamp(44px, 7.2vw, 96px);
    line-height: 0.95;
    font-weight: 500;
    letter-spacing: -0.035em;
    margin: 0 0 28px;
  }

  .h1-line1 {
    display: block;
    color: var(--fg-muted);
  }

  .h1-line2 {
    display: block;
    background: var(--accent-grad);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }

  .cursor-block {
    display: inline-block;
    width: 0.45em;
    height: 0.85em;
    background: var(--accent-soft);
    margin-left: 4px;
    vertical-align: -0.1em;
    border-radius: 2px;
    animation: blink 1.2s step-end infinite;
  }
  @keyframes blink { 0%,100% { opacity: 1; } 50% { opacity: 0; } }

  /* Sub */
  .hero-sub {
    font-size: 18px;
    line-height: 1.55;
    color: var(--fg-muted);
    max-width: 560px;
    margin: 0 0 36px;
  }

  /* Install bar */
  .install-bar {
    display: flex;
    align-items: stretch;
    border: 1px solid var(--line);
    border-radius: var(--radius, 6px);
    background: var(--bg-elev);
    max-width: 520px;
    margin-bottom: 24px;
    overflow: hidden;
  }

  .install-prompt {
    display: flex;
    align-items: center;
    padding: 0 14px;
    color: var(--accent);
    font-family: var(--font-mono);
    font-size: 13px;
    user-select: none;
    border-right: 1px solid var(--line-soft);
    flex-shrink: 0;
  }

  .install-cmd {
    flex: 1;
    padding: 13px 14px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--fg);
    overflow: auto;
    white-space: nowrap;
    background: transparent;
    border: 0;
    outline: none;
    min-width: 0;
  }

  .install-copy {
    border: 0;
    border-left: 1px solid var(--line-soft);
    background: transparent;
    color: var(--fg-muted);
    padding: 0 14px;
    cursor: pointer;
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.06em;
    transition: color 160ms ease;
    flex-shrink: 0;
  }
  .install-copy:hover { color: var(--fg); }
  .install-copy.copied { color: var(--accent); }

  /* CTA buttons */
  .btn-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 13px 22px;
    border-radius: var(--radius, 6px);
    font-family: var(--font-mono);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid transparent;
    background: transparent;
    color: var(--fg);
    text-decoration: none;
    transition: all 160ms ease;
    white-space: nowrap;
  }

  .btn-primary {
    background: var(--accent-grad);
    color: oklch(0.16 0.012 265);
    border-color: transparent;
  }
  .btn-primary:hover { transform: translateY(-1px); filter: brightness(1.06); }

  .btn-ghost {
    border-color: var(--line);
    color: var(--fg);
  }
  .btn-ghost:hover { border-color: var(--fg-muted); background: var(--bg-elev); }

  /* Stats */
  .hero-stats {
    margin-top: 56px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    border-top: 1px solid var(--line-soft);
    padding-top: 24px;
  }

  .stat {
    padding-right: 24px;
    border-right: 1px solid var(--line-soft);
  }
  .stat:last-child { border-right: 0; }

  .stat-label {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-muted);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 6px;
  }

  .stat-value {
    font-size: 22px;
    font-weight: 500;
    letter-spacing: -0.015em;
    line-height: 1;
  }

  .stat-sub {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-dim);
    margin-top: 4px;
  }

  @media (max-width: 960px) {
    .hero-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 600px) {
    .btn-row { flex-direction: column; }
    .btn { justify-content: center; }
  }
</style>

<!-- ═══ HERO ═══ -->
<section class="hero" id="hero">
  <div class="shell">
    <div class="hero-grid">

      <!-- Left: text + install + CTAs + stats -->
      <div>
        <div class="hero-badge-row">
          <app-logo style="--logo-size:36px" glow></app-logo>
          <span class="badge">
            <span class="badge-dot"></span>
            {{t.hero.eyebrow}}
          </span>
        </div>

        <h1>
          <span class="h1-line1">{{t.hero.tagline}}</span>
          <span class="h1-line2">{{t.hero.tagline2}}<span class="cursor-block"></span></span>
        </h1>

        <p class="hero-sub">{{t.hero.sub}}</p>

        <div class="install-bar">
          <span class="install-prompt">$</span>
          <code class="install-cmd" id="install-cmd">{{t.hero.install}}</code>
          <button class="install-copy" id="install-copy" aria-label="Copy">COPY</button>
        </div>

        <div class="btn-row">
          <a href="#cta" class="btn btn-primary">
            {{t.hero.cta}}
            <svg width="13" height="13" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M3 8h10M9 4l4 4-4 4" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </a>
          <a href="#quickstart" class="btn btn-ghost">{{t.hero.ctaSecondary}}</a>
        </div>

        <div class="hero-stats">
          <div class="stat">
            <div class="stat-label">{{t.hero.deps}}</div>
            <div class="stat-value">0</div>
          </div>
          <div class="stat">
            <div class="stat-label">{{t.hero.bundle}}</div>
            <div class="stat-value">~12 kb</div>
            <div class="stat-sub">gzipped</div>
          </div>
          <div class="stat">
            <div class="stat-label">{{t.hero.runtime}}</div>
            <div class="stat-value">Node 18+</div>
            <div class="stat-sub">no toolchain</div>
          </div>
        </div>
      </div>

      <!-- Right: interactive browser window with live counter -->
      <hero-counter></hero-counter>
    </div>
  </div>
</section>

<triangle-seam variant="wave"   seed="1" from-color="var(--bg)"      to-color="var(--bg-elev)"></triangle-seam>
<home-quickstart   loading="lazy"></home-quickstart>
<triangle-seam variant="sharp"  seed="2" from-color="var(--bg-elev)" to-color="var(--bg)"></triangle-seam>
<home-demos        loading="lazy"></home-demos>
<triangle-seam variant="fine"   seed="3" from-color="var(--bg)"      to-color="var(--bg-elev)"></triangle-seam>
<home-performance  loading="lazy"></home-performance>
<triangle-seam variant="sparse" seed="4" from-color="var(--bg-elev)" to-color="var(--bg)"></triangle-seam>
<home-features     loading="lazy"></home-features>
<triangle-seam variant="wave"   seed="5" from-color="var(--bg)"      to-color="var(--bg-elev)"></triangle-seam>
<home-structure    loading="lazy"></home-structure>
<triangle-seam variant="sharp"  seed="6" from-color="var(--bg-elev)" to-color="var(--bg)"></triangle-seam>
<home-architecture loading="lazy"></home-architecture>
<triangle-seam variant="fine"   seed="7" from-color="var(--bg)"      to-color="var(--bg-elev)"></triangle-seam>
<home-cta          loading="lazy"></home-cta>

<script>
import { Component, define } from '/core/component.js';

export default class HomePage extends Component {
  static templateUrl = '/app/Home/Home.html';
  static metadata = { title: 'Takeover – Zero-dependency full-stack framework', description: 'SSR, HMR, bundling, i18n — built on Node built-ins and the Web Components standard. No Vite. No Webpack. No node_modules.' };

  mount() {
    const cmd = this.$('#install-cmd');
    const btn = this.$('#install-copy');
    if (btn && cmd) {
      btn.addEventListener('click', () => {
        navigator.clipboard?.writeText(cmd.textContent.trim()).catch(() => {});
        btn.textContent = '✓ COPIED';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 1400);
      });
    }
  }
}

define('home-page', HomePage);
</script>
